name: Release Helm chart

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.4

      - name: Verify Chart.yaml version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          chart=$(helm show chart . | awk '/^version:/ {print $2}')
          if [ "$tag" != "$chart" ]; then
            echo "Chart version ($chart) does not match git tag ($tag)" >&2
            exit 1
          fi

      - name: Lint
        run: helm lint .

      - name: Package
        run: helm package . --destination dist

      - name: Login to GHCR
        run: helm registry login ghcr.io -u ${{ github.actor }} --password-stdin <<< "${{ secrets.GITHUB_TOKEN }}"

      - name: Push to GHCR
        run: |
          for tgz in dist/*.tgz; do
            helm push "$tgz" oci://ghcr.io/${{ github.repository_owner }}/charts
          done
